name: MANIFEST corpus check

# Enforce the machine-readable corpus contract on every push/PR.
# Runs the deterministic, dependency-free MANIFEST.json validator
# (scripts/check_manifest.py): paths exist, raw_url shape is canonical,
# size/sha256 match, and agent-facing docs carry no third-party cloud links.
# Runs offline so it needs no network access.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate MANIFEST.json
        run: python scripts/check_manifest.py
