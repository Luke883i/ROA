name: MANIFEST corpus check

# Enforce the machine-readable corpus contract on every push/PR.
# Runs the deterministic, dependency-free Operation/MANIFEST.json validator
# (Operation/scripts/check_manifest.py): paths exist, raw_url shape is canonical,
# size/sha256 match, and agent-facing docs carry no third-party cloud links.
# Runs offline so it needs no network access.

on:
  push:
    branches: ["**"]
    paths:
      - "**/*.pdf"
      - "README.md"
      - "Operation/**"
      - ".github/workflows/check-manifest.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**/*.pdf"
      - "README.md"
      - "Operation/**"
      - ".github/workflows/check-manifest.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install manifest build dependencies
        run: python -m pip install -r Operation/requirements-dev.txt

      - name: Validate Operation/MANIFEST.json
        run: python Operation/scripts/check_manifest.py

      - name: Verify generated manifest artifacts
        run: python Operation/scripts/build_manifest.py --check
