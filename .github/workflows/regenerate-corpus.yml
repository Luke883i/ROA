name: Regenerate corpus

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.pdf"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-corpus:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install manifest build dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Regenerate manifest artifacts
        run: python scripts/build_manifest.py

      - name: Commit regenerated corpus artifacts
        run: |
          status="$(git status --porcelain -- MANIFEST.json corpus/text)"
          if [ -z "$status" ]; then
            echo "No regenerated corpus changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MANIFEST.json corpus/text
          git commit -m "chore(corpus): regenerate manifest + text sidecars [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
